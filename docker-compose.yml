# Production Docker Compose — NOT for local development.
#
# Local dev uses: php artisan serve + npm run dev (see README)
#
# Usage (after Laravel is installed and .env is configured):
#   docker compose build
#   docker compose up -d
#   docker compose exec app php artisan migrate --force
#   docker compose exec app php artisan config:cache
#   docker compose exec app php artisan route:cache
#   docker compose exec app php artisan view:cache

name: competition-management

services:
  # ---------------------------------------------------------------------------
  # Nginx — reverse proxy, serves static files from /public
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - app_public:/var/www/html/public:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cms

  # ---------------------------------------------------------------------------
  # PHP-FPM — Laravel application
  # ---------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
      - app_public:/var/www/html/public
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cms

  # ---------------------------------------------------------------------------
  # Queue worker — processes async jobs (separate process, production pattern)
  # ---------------------------------------------------------------------------
  queue:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cms

  # ---------------------------------------------------------------------------
  # Scheduler — runs Laravel scheduled tasks every minute
  # ---------------------------------------------------------------------------
  scheduler:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: production
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      DB_HOST: mysql
      REDIS_HOST: redis
    volumes:
      - app_storage:/var/www/html/storage
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - cms

  # ---------------------------------------------------------------------------
  # MySQL 8 — primary database
  # ---------------------------------------------------------------------------
  mysql:
    image: mysql:8.4
    ports:
      - "${FORWARD_DB_PORT:-33060}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD:-secret}"
      MYSQL_DATABASE: "${DB_DATABASE:-competition_management}"
      MYSQL_USER: "${DB_USERNAME:-cms}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-secret}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-secret}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - cms

  # ---------------------------------------------------------------------------
  # Redis — cache, sessions, queues
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "${FORWARD_REDIS_PORT:-63790}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks:
      - cms

networks:
  cms:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  app_storage:
  app_public:
